name: CI/CD Pipeline Demo

on:
  push:
    branches: [ main ]

jobs:
  # Stage 1 - Build & Test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

  # Stage 2 - Deploy (only if tests pass)
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Vercel
        run: echo "✅ Tests passed! Deploying to production..."